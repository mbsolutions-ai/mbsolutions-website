<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled | MB Solutions AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --bg-card: #121214;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a5;
            --accent: #c9a962;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 500px;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 3rem;
        }
        
        .logo span { color: var(--accent); }
        
        .cancel-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-card);
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2.5rem;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: var(--bg-dark);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201, 169, 98, 0.3);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--text-secondary);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .help-text {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #333;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .help-text a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MB<span>Solutions</span> AI</div>
        
        <div class="cancel-icon">✕</div>
        
        <h1>Payment Cancelled</h1>
        
        <p>No worries! Your payment was not processed. If you have questions about our services or pricing, we're here to help.</p>
        
        <div class="buttons">
            <a href="pricing.html" class="btn btn-primary">Back to Pricing</a>
            <a href="mailto:contact@mbsolutions.ai" class="btn btn-secondary">Contact Us</a>
        </div>
        
        <div class="help-text">
            <p>Changed your mind? Questions about the process?</p>
            <p>Email us at <a href="mailto:contact@mbsolutions.ai">contact@mbsolutions.ai</a> or call (555) 123-4567</p>
        </div>
    </div>
</body>
</html>
